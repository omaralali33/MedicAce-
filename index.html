const INTUBATION_STEPS = [
  {step:1,title:"Preparation — SOAPME",icon:"🛠️",color:"#ffa502",content:"S = Suction (Yankauer + backup ready, functional). O = Oxygen (100% pre-oxygenation × 3 min). A = Airway (ETT sizes: target + one above + one below, 10mL syringe, stylet, tape, BOUGIE ready). P = Pharmacology (sedative + paralytic drawn and labelled). M = Monitor (SpO2, EtCO2, ECG, BP). E = Equipment (laryngoscope blade tested, video laryngoscope if available, BVM attached to O2)."},
  {step:2,title:"Pre-Oxygenation",icon:"💨",color:"#2ed573",content:"100% O2 via tight-fitting NRB mask minimum 3 minutes. In apneic/hypoventilating patients: BVM 2-person technique. Goal: SpO2 > 93–98% before induction. In critically ill patients, safe apnea time may be < 1 minute — efficiency matters. Consider HFNO (high-flow nasal oxygen) during intubation attempt if available to extend safe apnea window."},
  {step:3,title:"Pre-Treatment (Optional)",icon:"💊",color:"#a29bfe",content:"OPTIONAL — give 3 minutes before induction if time allows. Lidocaine 1.5mg/kg IV: blunts ICP response in head trauma (evidence mixed). Fentanyl 3mcg/kg IV: opioid blunting response (use in hemodynamically stable patients). Skip pre-treatment if the patient is critically unstable — speed of securing the airway is more important."},
  {step:4,title:"Sedation (Induction Agent)",icon:"😴",color:"#6c5ce7",content:"KETAMINE 1–2mg/kg IV: preferred choice for hemodynamically unstable, bronchospasm, trauma, excited delirium. Maintains BP and HR, bronchodilates. ETOMIDATE 0.3mg/kg IV: hemodynamically neutral, rapid onset (< 60s), minimal cardiac depression. Adrenal suppression concern in sepsis — single dose still widely used. PROPOFOL 1.5–2mg/kg IV: excellent sedation BUT causes hypotension — use ONLY in hemodynamically stable patients."},
  {step:5,title:"Paralytic (Neuromuscular Blockade)",icon:"⚗️",color:"#e84393",content:"SUCCINYLCHOLINE 1.5mg/kg IV: depolarizing agent — fast onset 45s, ultra-short 10min. CONTRAINDICATED: hyperkalemia, burns > 24h, crush injury > 72h, denervation, malignant hyperthermia history. ROCURONIUM 1.2mg/kg IV: non-depolarizing — use when succinylcholine is contraindicated. Onset ~60s at this dose. Duration 45–70 min. Reversed by sugammadex 16mg/kg. Wait for fasciculations (succ) or 60 seconds (roc) before attempting laryngoscopy."},

function XPBar({ xp, level }) {
  const pct = Math.min((xp % 200) / 200 * 100, 100);
  return (
    <div className="xp-bar-wrap">
      <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
        <span className="level-badge">LVL {level}</span>
        <span className="xp-label">{xp} XP</span>
      </div>
      <div className="xp-track"><div className="xp-fill" style={{ width: `${pct}%` }} /></div>
    </div>
  );
}

function ScenarioModule({ setXp, completedScenarios, setCompletedScenarios }) {
  const [active, setActive] = useState(null);
  const [step, setStep] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  const start = (sc) => { setActive(sc); setStep(0); setChosen(null); setScore(0); setDone(false); };

  const handleAnswer = (idx) => {
    if (chosen !== null) return;
    setChosen(idx);
    if (idx === active.steps[step].correct) setScore(s => s + 1);
  };

  const handleNext = () => {
    if (step + 1 >= active.steps.length) {
      const final = score + (chosen === active.steps[step].correct ? 1 : 0);
      setDone(true);
      setXp(x => x + Math.round(active.xp * (final / active.steps.length)));
      if (!completedScenarios.includes(active.id)) setCompletedScenarios(cs => [...cs, active.id]);
    } else { setStep(s => s + 1); setChosen(null); }
  };

  const DC = { Easy: "#2ed573", Medium: "#ffa502", Hard: "#ff4757" };
  const LT = ["A","B","C","D"];

  if (!active) return (
    <div>
      <div className="panel-title">🚑 Emergency Scenarios</div>
      <p style={{ color: "var(--muted)", fontSize: 12 }}>Real calls. Real decisions. Make the right call under pressure.</p>
      <div className="scenario-grid">
        {SCENARIOS.map(sc => (
          <div key={sc.id} className={`scenario-card ${completedScenarios.includes(sc.id) ? "done" : ""}`} onClick={() => start(sc)}>
            <div className="sc-header">
              <span className="sc-emoji">{sc.emoji}</span>
              <span className="sc-badge" style={{ background: DC[sc.difficulty]+"22", color: DC[sc.difficulty] }}>{sc.difficulty}</span>
            </div>
            <div className="sc-title">{sc.title}</div>
            <div className="sc-sub">Age {sc.age} · {sc.gender} · {sc.steps.length}Q</div>
            <div className="sc-xp">⭐ {sc.xp} XP {completedScenarios.includes(sc.id) ? "✅" : ""}</div>
          </div>
        ))}
      </div>
    </div>
  );

  if (done) {
    const final = score;
    const pct = Math.round(final / active.steps.length * 100);
    return (
      <div>
        <button className="back-btn" onClick={() => setActive(null)}>← Back to Scenarios</button>
        <div className="result-card">
          <div className="result-emoji">{pct >= 80 ? "🏆" : pct >= 60 ? "🎯" : "📚"}</div>
          <div className="result-title">{pct >= 80 ? "Outstanding!" : pct >= 60 ? "Good Call!" : "Keep Studying!"}</div>
          <div style={{ color: "var(--muted)", fontSize: 12, margin: "5px 0" }}>{final}/{active.steps.length} correct · {active.title}</div>
          <div className="score-bar"><div className="score-fill" style={{ width: `${pct}%` }} /></div>
          <div className="result-xp">+{Math.round(active.xp * (final / active.steps.length))} XP earned</div>
          <button className="next-btn" style={{ marginTop: 16 }} onClick={() => setActive(null)}>Try Another Scenario →</button>
        </div>
      </div>
    );
  }

  const q = active.steps[step];
  return (
    <div>
      <button className="back-btn" onClick={() => setActive(null)}>← Back to Scenarios</button>
      <div className="patient-card">
        <div className="patient-header"><span className="patient-emoji">{active.emoji}</span><div><div className="patient-title">{active.title}</div><div className="patient-sub">{active.age}yo {active.gender}</div></div></div>
        <div className="chief-complaint"><strong>Chief Complaint:</strong> {active.chief}</div>
        <div className="vitals-grid">{Object.entries(active.vitals).map(([k,v]) => (<div key={k} className="vital-chip"><div className="vital-label">{k.toUpperCase()}</div><div className="vital-val">{v}</div></div>))}</div>
        <div className="history-box"><strong>History:</strong> {active.history}</div>
      </div>
      <div className="question-wrap">
        <div className="q-step">QUESTION {step+1} OF {active.steps.length}</div>
        <div className="q-progress"><div className="q-progress-fill" style={{ width:`${(step/active.steps.length)*100}%` }} /></div>
        <div className="q-text">{q.q}</div>
        <div className="options">
          {q.options.map((opt,i) => {
            let cls="option-btn";
            if(chosen!==null){if(i===q.correct)cls+=" correct";else if(i===chosen&&chosen!==q.correct)cls+=" wrong";}
            return (<button key={i} className={cls} disabled={chosen!==null} onClick={()=>handleAnswer(i)}><span className="option-letter">{LT[i]}</span>{opt}</button>);
          })}
        </div>
        {chosen!==null&&(<><div className="explain-box">💡 <strong>Explanation:</strong> {q.explain}</div><button className="next-btn" onClick={handleNext}>{step+1>=active.steps.length?"See Results →":"Next Question →"}</button></>)}
      </div>
    </div>
  );
}

function TerminologyModule({ setXp }) {
  const [mode, setMode] = useState("flashcard");
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [quizQ, setQuizQ] = useState(null);
  const [quizChosen, setQuizChosen] = useState(null);
  const [streak, setStreak] = useState(0);
  const [filter, setFilter] = useState("All");

  const cats = ["All",...Array.from(new Set(TERMS.map(t=>t.category))).sort()];
  const filtered = filter==="All" ? TERMS : TERMS.filter(t=>t.category===filter);

  const genQuiz = () => {
    if(TERMS.length<4) return;
    const correct = filtered[Math.floor(Math.random()*filtered.length)];
    const dist = TERMS.filter(t=>t.term!==correct.term).sort(()=>Math.random()-0.5).slice(0,3);
    const opts = [...dist,correct].sort(()=>Math.random()-0.5);
    setQuizQ({correct,opts,correctIdx:opts.indexOf(correct)});
    setQuizChosen(null);
  };
  useEffect(()=>{ if(mode==="quiz") genQuiz(); },[mode,filter]);

  const LT=["A","B","C","D"];
  const term = filtered[idx%filtered.length];

  return (
    <div>
      <div className="panel-title">📖 Medical Terminology</div>
      <div style={{ display:"flex", gap:7, marginBottom:12, flexWrap:"wrap" }}>
        {["flashcard","quiz"].map(m=>(
          <button key={m} className={`mode-tab ${mode===m?"active":""}`} onClick={()=>{setMode(m);setFlipped(false);setIdx(0);}}>
            {m==="flashcard"?"📚 Flashcards":"🎯 Quiz Mode"}
          </button>
        ))}
        <select value={filter} onChange={e=>{setFilter(e.target.value);setIdx(0);setFlipped(false);}}
          style={{background:"var(--surface2)",border:"1px solid rgba(255,255,255,0.1)",color:"var(--muted)",padding:"5px 9px",borderRadius:99,fontSize:10,fontFamily:"Oxanium,monospace",cursor:"pointer"}}>
          {cats.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <span style={{fontSize:10,color:"var(--muted)",alignSelf:"center"}}>{filtered.length} terms</span>
      </div>

      {mode==="flashcard"&&term&&(
        <div>
          <div className={`term-card ${flipped?"flip":""}`} onClick={()=>setFlipped(f=>!f)}>
            {!flipped
              ?<><div className="term-emoji-big">{term.emoji}</div><div className="term-word">{term.term}</div><div className="term-cat">{term.category}</div><div className="tap-hint" style={{marginTop:10}}>👆 Tap to reveal definition</div></>
              :<><div className="term-emoji-big">{term.emoji}</div><div className="term-def">{term.def}</div><div className="term-cat">{term.category}</div><div className="tap-hint">👆 Tap to flip back</div></>
            }
          </div>
          <div className="term-nav">
            <button className="term-btn" onClick={()=>{setIdx(i=>(i-1+filtered.length)%filtered.length);setFlipped(false);}}>← Prev</button>
            <span className="term-count">{(idx%filtered.length)+1} / {filtered.length}</span>
            <button className="term-btn" onClick={()=>{setIdx(i=>(i+1)%filtered.length);setFlipped(false);}}>Next →</button>
          </div>
        </div>
      )}

      {mode==="quiz"&&quizQ&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:11}}>
            <span style={{color:"var(--muted)",fontSize:11}}>What does this term mean?</span>
            {streak>1&&<span className="streak-badge">🔥 {streak} streak! +15 XP</span>}
          </div>
          <div className="term-quiz-question">
            <div className="term-emoji-big">{quizQ.correct.emoji}</div>
            <div className="term-word">{quizQ.correct.term}</div>
            <div className="term-cat">{quizQ.correct.category}</div>
          </div>
          <div className="options">
            {quizQ.opts.map((opt,i)=>{
              let cls="option-btn";
              if(quizChosen!==null){if(i===quizQ.correctIdx)cls+=" correct";else if(i===quizChosen)cls+=" wrong";}
              return(<button key={i} className={cls} disabled={quizChosen!==null} onClick={()=>{setQuizChosen(i);if(i===quizQ.correctIdx){setStreak(s=>s+1);setXp(x=>x+15);}else setStreak(0);}}><span className="option-letter">{LT[i]}</span>{opt.def}</button>);
            })}
          </div>
          {quizChosen!==null&&<button className="next-btn" style={{marginTop:11}} onClick={genQuiz}>Next Term →</button>}
        </div>
      )}
    </div>
  );
}

// Minimal Supabase client (no SDK dependency needed)
const sb = {
  _headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` },

  async signUp(email, password, meta = {}) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST", headers: this._headers,
      body: JSON.stringify({ email, password, data: meta }),
    });
    return r.json();
  },

  async signIn(email, password) {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST", headers: this._headers,
      body: JSON.stringify({ email, password }),
    });
    return r.json();
  },

  async signOut(accessToken) {
    await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
      method: "POST", headers: { ...this._headers, "Authorization": `Bearer ${accessToken}` },
    });
  },

  async getProfile(userId, accessToken) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=*`, {
      headers: { ...this._headers, "Authorization": `Bearer ${accessToken}` },
    });
    const data = await r.json();
    return Array.isArray(data) ? data[0] : null;
  },

  async upsertProfile(profile, accessToken) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/profiles`, {
      method: "POST",
      headers: { ...this._headers, "Authorization": `Bearer ${accessToken}`, "Prefer": "resolution=merge-duplicates" },
      body: JSON.stringify(profile),
    });
    return r.ok;
  },

  async updateProfile(userId, updates, accessToken) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}`, {
      method: "PATCH",
      headers: { ...this._headers, "Authorization": `Bearer ${accessToken}` },
      body: JSON.stringify({ ...updates, updated_at: new Date().toISOString() }),
    });
    return r.ok;
  },
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function hashPass(pw) {
  let h = 0;
  for (let i = 0; i < pw.length; i++) { h = ((h << 5) - h) + pw.charCodeAt(i); h |= 0; }
  return Math.abs(h).toString(36);
}

function avatarColor(email) {
  const cols = ["#ff4757","#ffa502","#2ed573","#1e90ff","#a29bfe","#fd79a8","#00cec9","#fdcb6e","#e84393","#00d2ff"];
  let h = 0; for (let c of email) h = (h * 31 + c.charCodeAt(0)) | 0;
  return cols[Math.abs(h) % cols.length];
}

function initials(name) {
  return name.trim().split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2) || "?";
}

function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  const [showPw, setShowPw] = useState(false);
  const [successMsg, setSuccessMsg] = useState("");

  const clearErr = () => setError("");

  const handleLogin = async () => {
    setError(""); setLoading(true);
    if (!email.trim() || !password) { setError("Please fill in all fields."); setLoading(false); return; }
    try {
      const res = await sb.signIn(email.trim().toLowerCase(), password);
      if (res.error || !res.access_token) {
        setError(res.error?.message || "Incorrect email or password.");
        setLoading(false); return;
      }
      // Fetch profile from Supabase
      const profile = await sb.getProfile(res.user.id, res.access_token);
      onLogin({
        id: res.user.id,
        email: res.user.email,
        accessToken: res.access_token,
        name: profile?.name || res.user.email,
        school: profile?.school || "",
        bio: profile?.bio || "",
        avatarColor: profile?.avatar_color || avatarColor(res.user.email),
        xp: profile?.xp || 0,
        completedScenarios: profile?.completed_scenarios || [],
      });
    } catch(e) { setError("Login failed. Check your connection and try again."); }
    setLoading(false);
  };

  const handleRegister = async () => {
    setError(""); setLoading(true);
    if (!name.trim() || !email.trim() || !password || !confirm) { setError("Please fill in all fields."); setLoading(false); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) { setError("Please enter a valid email address."); setLoading(false); return; }
    if (password.length < 6) { setError("Password must be at least 6 characters."); setLoading(false); return; }
    if (password !== confirm) { setError("Passwords do not match."); setLoading(false); return; }
    try {
      const color = avatarColor(email.trim().toLowerCase());
      const res = await sb.signUp(email.trim().toLowerCase(), password, { name: name.trim(), avatar_color: color });
      if (res.error) { setError(res.error.message || "Registration failed."); setLoading(false); return; }

      if (res.user && !res.session) {
        // Email confirmation required
        setSuccessMsg("✅ Account created! Check your email to confirm, then sign in.");
        setMode("login"); setLoading(false); return;
      }
      if (res.session) {
        // Auto-confirmed (email confirmation disabled)
        const profile = await sb.getProfile(res.user.id, res.session.access_token);
        onLogin({
          id: res.user.id, email: res.user.email,
          accessToken: res.session.access_token,
          name: name.trim(), school: "", bio: "",
          avatarColor: color, xp: profile?.xp || 0,
          completedScenarios: profile?.completed_scenarios || [],
        });
        return;
      }
      setError("Something went wrong. Please try again.");
    } catch(e) { setError("Registration failed. Check your connection."); }
    setLoading(false);
  };

  const inputStyle = {
    width:"100%", background:"var(--surface2)", border:"1px solid rgba(255,255,255,0.12)",
    color:"var(--text)", padding:"13px 16px", borderRadius:12, fontSize:14,
    fontFamily:"Nunito,sans-serif", outline:"none", marginBottom:12, transition:"border-color 0.2s",
  };

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ width:"100%", maxWidth:400 }}>
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ fontSize:52, marginBottom:10 }}>🚑</div>
          <div style={{ fontFamily:"Oxanium,monospace", fontSize:28, fontWeight:800, color:"var(--accent)", letterSpacing:2 }}>MedicAce</div>
          <div style={{ fontSize:11, color:"var(--muted)", letterSpacing:3, textTransform:"uppercase", marginTop:4 }}>Paramedic Training Platform</div>
        </div>

        <div style={{ background:"var(--surface)", borderRadius:20, padding:28, border:"1px solid rgba(0,210,255,0.15)", boxShadow:"0 20px 60px rgba(0,0,0,0.5)" }}>
          <div style={{ display:"flex", background:"var(--surface2)", borderRadius:12, padding:4, marginBottom:24, gap:4 }}>
            {["login","register"].map(m => (
              <button key={m} onClick={() => { setMode(m); clearErr(); setSuccessMsg(""); }}
                style={{ flex:1, padding:"9px 0", borderRadius:9, border:"none", cursor:"pointer", fontFamily:"Oxanium,monospace", fontWeight:800, fontSize:12, transition:"all 0.2s",
                  background: mode===m ? "var(--accent)" : "transparent", color: mode===m ? "#000" : "var(--muted)", letterSpacing:1 }}>
                {m === "login" ? "SIGN IN" : "REGISTER"}
              </button>
            ))}
          </div>

          {successMsg && (
            <div style={{ background:"rgba(46,213,115,0.1)", border:"1px solid rgba(46,213,115,0.3)", borderRadius:9, padding:"10px 14px", marginBottom:14, fontSize:12, color:"var(--success)", lineHeight:1.5 }}>
              {successMsg}
            </div>
          )}

          {mode === "register" && (
            <input style={inputStyle} placeholder="Full Name" value={name} onChange={e => setName(e.target.value)}
              onFocus={e => e.target.style.borderColor="var(--accent)"} onBlur={e => e.target.style.borderColor="rgba(255,255,255,0.12)"} />
          )}

          <input style={inputStyle} placeholder="Email address" type="email" value={email} onChange={e => setEmail(e.target.value)}
            onFocus={e => e.target.style.borderColor="var(--accent)"} onBlur={e => e.target.style.borderColor="rgba(255,255,255,0.12)"} />

          <div style={{ position:"relative" }}>
            <input style={{...inputStyle, paddingRight:48}} placeholder="Password" type={showPw ? "text" : "password"} value={password} onChange={e => setPassword(e.target.value)}
              onFocus={e => e.target.style.borderColor="var(--accent)"} onBlur={e => e.target.style.borderColor="rgba(255,255,255,0.12)"}
              onKeyDown={e => { if(e.key==="Enter") mode==="login" ? handleLogin() : handleRegister(); }} />
            <button onClick={() => setShowPw(s=>!s)} style={{ position:"absolute", right:14, top:14, background:"none", border:"none", color:"var(--muted)", cursor:"pointer", fontSize:16 }}>
              {showPw ? "🙈" : "👁️"}
            </button>
          </div>

          {mode === "register" && (
            <input style={inputStyle} placeholder="Confirm Password" type={showPw ? "text" : "password"} value={confirm} onChange={e => setConfirm(e.target.value)}
              onFocus={e => e.target.style.borderColor="var(--accent)"} onBlur={e => e.target.style.borderColor="rgba(255,255,255,0.12)"}
              onKeyDown={e => { if(e.key==="Enter") handleRegister(); }} />
          )}

          {error && (
            <div style={{ background:"rgba(255,71,87,0.1)", border:"1px solid rgba(255,71,87,0.3)", borderRadius:9, padding:"10px 14px", marginBottom:14, fontSize:12, color:"var(--danger)", lineHeight:1.5 }}>
              ⚠️ {error}
            </div>
          )}

          <button onClick={mode==="login" ? handleLogin : handleRegister} disabled={loading}
            style={{ width:"100%", background:"var(--accent)", color:"#000", border:"none", padding:"14px 0", borderRadius:12, fontFamily:"Oxanium,monospace", fontWeight:800, fontSize:15, cursor:loading?"not-allowed":"pointer", opacity:loading?0.6:1, letterSpacing:1, transition:"all 0.2s" }}>
            {loading ? "⏳ Please wait..." : mode==="login" ? "SIGN IN →" : "CREATE ACCOUNT →"}
          </button>

          <div style={{ textAlign:"center", marginTop:16, fontSize:12, color:"var(--muted)" }}>
            {mode==="login" ? "Don't have an account? " : "Already have an account? "}
            <span onClick={() => { setMode(mode==="login"?"register":"login"); clearErr(); setSuccessMsg(""); }} style={{ color:"var(--accent)", cursor:"pointer", fontWeight:700 }}>
              {mode==="login" ? "Register here" : "Sign in"}
            </span>
          </div>
        </div>

        <div style={{ textAlign:"center", marginTop:20, fontSize:11, color:"rgba(136,146,176,0.4)" }}>
          🔒 Powered by Supabase · Data stored securely in the cloud
        </div>
      </div>
    </div>
  );
}

        </div>
        <div style={{ height:10, background:"var(--surface2)", borderRadius:99, overflow:"hidden" }}>
          <div style={{ height:"100%", width:`${(xpInLevel/200)*100}%`, background:`linear-gradient(90deg,var(--accent),#0066ff)`, borderRadius:99, transition:"width 1s ease" }} />
        </div>
      </div>

      {/* Badges */}
      <div style={{ background:"var(--surface)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:18, marginBottom:18 }}>

              <span style={{ fontSize:22 }}>{b.label.split(" ")[0]}</span>
              <div>
                <div style={{ fontSize:12, fontWeight:700, color:b.condition?"var(--text)":"var(--muted)" }}>{b.label.split(" ").slice(1).join(" ")}</div>
                <div style={{ fontSize:10, color:b.condition?"var(--accent)":"var(--muted)" }}>{b.condition ? "✅ Unlocked" : b.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Completed Scenarios */}
      {completedScenarios.length > 0 && (
        <div style={{ background:"var(--surface)", border:"1px solid rgba(255,255,255,0.06)", borderRadius:14, padding:18, marginBottom:18 }}>
          <div style={{ fontFamily:"Oxanium,monospace", fontSize:13, fontWeight:800, marginBottom:12 }}>🚑 Completed Scenarios</div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
            {completedScenarios.map(id => {
              const sc = SCENARIOS.find(s => s.id === id);
              if (!sc) return null;
              return (
                <div key={id} style={{ background:"rgba(46,213,115,0.1)", border:"1px solid rgba(46,213,115,0.3)", borderRadius:8, padding:"6px 12px", fontSize:12, color:"var(--success)" }}>
                  {sc.emoji} {sc.title}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <Watermark />
    </div>
  );
}

function App() {
  const [authState, setAuthState] = useState("loading");
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState("home");
  const [xp, setXp] = useState(0);
  const [completedScenarios, setCompletedScenarios] = useState([]);

  const level = Math.max(1, Math.floor(xp / 200) + 1);

  // Restore session from localStorage on mount
  useEffect(() => {
    (async () => {
      try {
        const raw = localStorage.getItem("pg_session");
        if (raw) {
          const sess = JSON.parse(raw);
          // Re-fetch latest profile from Supabase
          const profile = await sb.getProfile(sess.id, sess.accessToken);
          if (profile) {
            setUser({ ...sess, xp: profile.xp || 0, completedScenarios: profile.completed_scenarios || [], school: profile.school || "", bio: profile.bio || "", name: profile.name || sess.name });
            setXp(profile.xp || 0);
            setCompletedScenarios(profile.completed_scenarios || []);
            setAuthState("app");
            return;
          }
        }
      } catch(_) {}
      setAuthState("auth");
    })();
  }, []);

  // Sync XP + completedScenarios to Supabase whenever they change
  useEffect(() => {
    if (!user || authState !== "app") return;
    const t = setTimeout(() => {
      sb.updateProfile(user.id, { xp, completed_scenarios: completedScenarios }, user.accessToken).catch(()=>{});
    }, 1000); // debounce 1s
    return () => clearTimeout(t);
  }, [xp, completedScenarios]);

  const handleLogin = (u) => {
    setUser(u);
    setXp(u.xp || 0);
    setCompletedScenarios(u.completedScenarios || []);
    localStorage.setItem("pg_session", JSON.stringify({ id: u.id, email: u.email, accessToken: u.accessToken, name: u.name, avatarColor: u.avatarColor }));
    setAuthState("app");
    setTab("home");
  };

  const handleLogout = async () => {
    try { await sb.signOut(user.accessToken); } catch(_) {}
    localStorage.removeItem("pg_session");
    setUser(null); setXp(0); setCompletedScenarios([]);
    setTab("home"); setAuthState("auth");
  };

  const BADGES = [
    {label:"🚑 First Responder", condition:xp>=50},
    {label:"💊 Med Student", condition:xp>=200},
    {label:"🎯 Scenario Ace", condition:completedScenarios.length>=3},
    {label:"🫁 Airway Master", condition:xp>=400},
    {label:"🔥 On Fire", condition:xp>=600},
    {label:"🏆 Paramedic Pro", condition:xp>=1000},
    {label:"⭐ Elite Medic", condition:completedScenarios.length>=8},
  ];

  if (authState === "loading") return (
    <>
      <style>{CSS}</style>
      <div style={{ minHeight:"100vh", background:"var(--bg)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
        <div style={{ fontSize:48 }}>🚑</div>
        <div style={{ fontFamily:"Oxanium,monospace", color:"var(--accent)", fontSize:14, letterSpacing:3 }}>LOADING...</div>
        <div style={{ width:120, height:4, background:"var(--surface)", borderRadius:99, overflow:"hidden" }}>
          <div style={{ height:"100%", background:"var(--accent)", borderRadius:99, animation:"loadbar 1.2s ease-in-out infinite" }} />
        </div>
        <style>{`@keyframes loadbar{0%{width:0%}50%{width:100%}100%{width:0%;left:100%}}`}</style>
      </div>
    </>
  );

  if (authState === "auth") return <><style>{CSS}</style><AuthScreen onLogin={handleLogin} /></>;

  if (tab === "profile") return (
    <ProfilePage user={user} setUser={u => setUser(u)} onLogout={handleLogout} completedScenarios={completedScenarios} xp={xp} />
  );

  return (
    <>
      <style>{CSS}</style>
      <div className="app">
        <div className="header">
          <div className="logo">
            <span className="logo-icon">🚑</span>
            <div><div className="logo-text">MedicAce</div><div className="logo-sub">Paramedic Training Platform</div></div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <XPBar xp={xp} level={level} />
            <div onClick={() => setTab("profile")} title="My Profile"
              style={{ width:38, height:38, borderRadius:"50%", background:`linear-gradient(135deg,${user.avatarColor},${user.avatarColor}88)`, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Oxanium,monospace", fontWeight:800, fontSize:14, color:"#fff", cursor:"pointer", flexShrink:0, boxShadow:`0 0 12px ${user.avatarColor}44`, border:"2px solid rgba(255,255,255,0.15)", transition:"transform 0.2s" }}
              onMouseEnter={e=>e.currentTarget.style.transform="scale(1.1)"}
              onMouseLeave={e=>e.currentTarget.style.transform=""}>
              {initials(user.name)}
            </div>
          </div>
        </div>

        {tab==="home" && (
          <div className="panel" style={{marginBottom:18}}>
            <div className="home-hero">
              <div style={{ fontSize:13, color:"var(--accent)", fontFamily:"Oxanium,monospace", marginBottom:6 }}>👋 Welcome back, {user.name.split(" ")[0]}!</div>
              <div className="hero-title">Train Like Your <span className="hero-accent">Patient's Life</span> Depends On It</div>
              <div className="hero-sub">Scenarios, terminology, intubation, drug guides, protocols — all in one place.</div>
              <div className="stats-row">
                <div className="stat-box"><div className="stat-num">{SCENARIOS.length}</div><div className="stat-label">Scenarios</div></div>
                <div className="stat-box"><div className="stat-num">{TERMS.length}</div><div className="stat-label">Med Terms</div></div>
                <div className="stat-box"><div className="stat-num">{DRUGS.length}</div><div className="stat-label">Drugs</div></div>
                <div className="stat-box"><div className="stat-num">{PROTOCOLS.length}</div><div className="stat-label">Protocols</div></div>
                <div className="stat-box"><div className="stat-num">{INTUBATION_STEPS.length}</div><div className="stat-label">RSI Steps</div></div>
                <div className="stat-box"><div className="stat-num">{QUICK_TIPS.length}</div><div className="stat-label">Quick Tips</div></div>
                <div className="stat-box"><div className="stat-num">{HEM_QUESTIONS.length}</div><div className="stat-label">Exam Qs</div></div>
              </div>
            </div>
            <div style={{padding:"0 4px"}}>
              <div style={{fontFamily:"Oxanium,monospace",fontSize:11,color:"var(--muted)",marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Your Badges</div>
              <div className="badge-row">
                {BADGES.map(b=>(
                  <span key={b.label} className={`badge ${b.condition?"earned":""}`}
                    style={{borderColor:b.condition?"var(--accent)":"rgba(255,255,255,0.1)",color:b.condition?"var(--accent)":"var(--muted)"}}>
                    {b.label}
                  </span>
                ))}
              </div>
            </div>
          </div>
        )}

        <div className="nav">
          {MODULES.map(m=>(
            <div key={m.id} className={`nav-card ${tab===m.id?"active":""}`} onClick={()=>setTab(m.id)}
              style={tab===m.id?{boxShadow:`0 0 18px ${m.color}33`}:{}}>
              <span className="nav-icon">{m.icon}</span>
              <div className="nav-label">{m.label}</div>
              <div className="nav-desc">{m.desc}</div>
              <div className="nav-dot" style={{background:m.color}} />
            </div>
          ))}
        </div>

        <div className="panel">
          {tab==="home" && (
            <div>
              <div className="panel-title" style={{marginBottom:9}}>🎮 Quick Start</div>
              <p style={{color:"var(--muted)",fontSize:13,lineHeight:1.7}}>
                Choose any module above to begin. Complete scenarios to earn XP and unlock badges. Drill terminology until it's automatic. Study intubation steps until you can do them in your sleep. Train hard — save lives.
              </p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginTop:14}}>
                <button className="next-btn" style={{margin:0}} onClick={()=>setTab("scenarios")}>🚑 Run a Scenario</button>
                <button className="next-btn" style={{margin:0,background:"#00cec9"}} onClick={()=>setTab("intubation")}>🫁 Learn Intubation</button>
              </div>
            </div>
          )}
          {tab==="scenarios"   &&<ScenarioModule setXp={setXp} completedScenarios={completedScenarios} setCompletedScenarios={setCompletedScenarios}/>}
          {tab==="terminology" &&<TerminologyModule setXp={setXp}/>}
          {tab==="vitals"      &&<VitalsModule/>}
          {tab==="protocols"   &&<ProtocolsModule/>}
          {tab==="pharmacology"&&<PharmacologyModule/>}
          {tab==="intubation"  &&<IntubationModule/>}
          {tab==="anatomy"     &&<AnatomyModule/>}
          {tab==="quicktips"  &&<QuickTipsModule/>}
          {tab==="exams"      &&<ExamPrepModule/>}
        </div>

        <Watermark />
      </div>
    </>
  );
}

          <button className="next-btn" style={{ margin:0, maxWidth:200, opacity:answered?1:0.3 }} disabled={!answered}
            onClick={() => { if(current+1>=HEM_QUESTIONS.length) setExamState(s=>({...s,done:true})); else setExamState(s=>({...s,current:s.current+1})); }}>

        </div>
      </div>

  }

  // HOME VIEW
  return (
    <div>
      <div className="panel-title">🎓 HEM 3106 Exam Prep</div>

        { cat:"Nightclub Scenario", emoji:"🌙", color:"#6c5ce7", items:["Patient 1: Opioid OD & re-narcotisation","Patient 2: Stimulant toxicity & VT","Patient 3: Benzodiazepine OD","β-blocker contraindication"] },
      ].map(t => (
        <div key={t.cat} style={{ background:"var(--surface2)", borderRadius:12, padding:"13px 15px", marginBottom:10, borderLeft:`3px solid ${t.color}` }}>
          <div style={{ display:"flex", alignItems:"center", gap:9, marginBottom:8 }}>
            <span style={{ fontSize:20 }}>{t.emoji}</span>
            <div style={{ fontFamily:"Oxanium,monospace", fontSize:13, fontWeight:800, color:t.color }}>{t.cat}</div>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {t.items.map((item, i) => (
              <span key={i} style={{ background:`${t.color}15`, border:`1px solid ${t.color}33`, color:t.color, borderRadius:99, padding:"3px 10px", fontSize:10, fontFamily:"Oxanium,monospace" }}>{item}</span>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
